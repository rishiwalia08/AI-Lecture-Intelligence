services:
  - type: web
    name: ai-lecture-intelligence
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HF_API_KEY
        sync: false
