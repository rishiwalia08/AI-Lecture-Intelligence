services:
  - type: web
    name: ai-lecture-intelligence
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio --http h11
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
