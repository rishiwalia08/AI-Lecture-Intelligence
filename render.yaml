services:
  - type: web
    name: ai-lecture-intelligence
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HF_API_KEY
        sync: false
