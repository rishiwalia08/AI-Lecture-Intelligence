services:
  - type: web
    name: ai-lecture-intelligence-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT --loop asyncio --http h11
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: ai-lecture-intelligence-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://ai-lecture-intelligence-backend.onrender.com/api/v1
